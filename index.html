<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadPredictor Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="24" height="24" rx="4" fill="#E2E8F0"/>
                    <path d="M12 16L6 8H18L12 16Z" fill="#1E293B"/>
                </svg>
                <span>LeadPredictor</span>
            </div>

            <div class="input-group">
                <label>Language</label>
                <select>
                    <option>🇺🇸 English</option>
                </select>
            </div>

            <div class="input-group">
                <label>Currency</label>
                <select>
                    <option>$ US Dollar</option>
                </select>
            </div>

            <div class="input-group">
                <label>Campaign Start</label>
                <input type="date" value="2026-05-08">
            </div>

            <div class="input-group">
                <label>Campaign End</label>
                <input type="date" value="2026-11-04">
            </div>

            <div class="input-group">
                <label>Total Revenue</label>
                <div class="input-icon">
                    <span>$</span>
                    <input type="number" id="revenue" value="10000">
                </div>
            </div>

            <div class="input-group">
                <label>Avg. Order Value</label>
                <div class="input-icon">
                    <span>$</span>
                    <input type="number" id="aov" value="1000">
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-section">
                <!-- Chart Area -->
                <div class="chart-container">
                    <div class="chart-wrapper">
                        <div class="y-axis-label">Months</div>
                        <div class="chart-inner-wrapper">
                            <!-- Placeholder for the chart -->
                            <div class="dummy-chart" id="chart-area">
                                <!-- Chart rows will be generated by JS -->
                            </div>
                            <div class="x-axis-labels" id="x-axis">
                                <!-- X-axis generated by JS -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Stats Cards -->
                <div class="stats-container">
                    <div class="stat-card">
                        <div class="stat-header">
                            <span class="icon">📁</span>
                            <span class="label">Prospects</span>
                            <span class="percentage" id="prospects-pct">100%</span>
                        </div>
                        <div class="stat-value" id="val-prospects">125</div>
                        <div class="progress-bar-bg"><div class="progress-bar" id="bar-prospects" style="width: 100%"></div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <span class="icon">👤</span>
                            <span class="label">Leads</span>
                            <span class="percentage" id="leads-pct">20%</span>
                        </div>
                        <div class="stat-value" id="val-leads">25</div>
                        <div class="progress-bar-bg"><div class="progress-bar" id="bar-leads" style="width: 20%"></div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <span class="icon">🏆</span>
                            <span class="label">Customers</span>
                            <span class="percentage" id="customers-pct">8%</span>
                        </div>
                        <div class="stat-value" id="val-customers">10</div>
                        <div class="progress-bar-bg"><div class="progress-bar" id="bar-customers" style="width: 8%"></div></div>
                    </div>
                </div>
            </div>

            <!-- Bottom Sliders -->
            <div class="bottom-section">
                <div class="slider-group">
                    <div class="slider-header">
                        <label>Lead Response Rate</label>
                    </div>
                    <input type="range" id="lead-rate" min="1" max="100" value="40" step="1">
                    <div class="slider-value"><span id="lead-rate-val">40.00</span>%</div>
                </div>
                
                <div class="slider-group">
                    <div class="slider-header">
                        <label>Prospect Response Rate</label>
                    </div>
                    <input type="range" id="prospect-rate" min="1" max="100" value="20" step="1">
                    <div class="slider-value"><span id="prospect-rate-val">20.00</span>%</div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
